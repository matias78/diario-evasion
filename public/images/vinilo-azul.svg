<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#1a1a1a"/>

  <!-- Surface shadow -->
  <ellipse cx="600" cy="550" rx="280" ry="40" fill="#000000" opacity="0.4"/>

  <!-- Vinyl record -->
  <circle cx="600" cy="300" r="250" fill="#3a7bc8"/>

  <!-- Vinyl grooves -->
  <circle cx="600" cy="300" r="240" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="220" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="200" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="180" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="160" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="140" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="120" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="300" r="100" fill="none" stroke="#000000" stroke-width="1" opacity="0.2"/>

  <!-- Center label -->
  <circle cx="600" cy="300" r="90" fill="#1a1a1a"/>
  <circle cx="600" cy="300" r="85" fill="none" stroke="#4a90e2" stroke-width="2"/>

  <!-- Label text -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4a90e2" text-anchor="middle">SONY</text>
  <text x="600" y="315" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">33⅓ RPM</text>

  <!-- Center hole -->
  <circle cx="600" cy="300" r="10" fill="#0a0a0a"/>

  <!-- Light reflection -->
  <ellipse cx="500" cy="250" rx="120" ry="60" fill="#ffffff" opacity="0.1" transform="rotate(-30 500 250)"/>
  <ellipse cx="520" cy="270" rx="80" ry="40" fill="#ffffff" opacity="0.15" transform="rotate(-30 520 270)"/>
</svg>
